services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: reposage-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=${ANONYMIZED_TELEMETRY:-FALSE}
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: reposage-ai-engine
    ports:
      - "8000:8000"
    volumes:
      - ./ai-engine:/usr/src/app
      - /usr/src/app/__pycache__
    environment:
      - PORT=8000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - CHROMA_HOST=${CHROMA_HOST:-chromadb}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - CHROMA_COLLECTION=${CHROMA_COLLECTION:-reposage_code_chunks}
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reposage-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=5000
      - AI_ENGINE_URL=http://ai-engine:8000
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY}
      - GITHUB_PAT=${GITHUB_PAT}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - GIT_CLONE_TIMEOUT=${GIT_CLONE_TIMEOUT:-120000}
      - MAX_REPO_SIZE_MB=${MAX_REPO_SIZE_MB:-100}
    depends_on:
      ai-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reposage-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  chroma_data:
