services:
  # ----------------------------------------
  # ⚙️ Node.js Backend Service
  # ----------------------------------------
  - type: web
    name: reposage-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GITHUB_PAT
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: REPOSAGE_API_KEY
        sync: false
      - key: AI_ENGINE_URL
        # We will point this to the AI engine service created below
        value: "https://reposage-ai-engine.onrender.com"
      - key: MONGODB_URI
        sync: false

  # ----------------------------------------
  # 🧠 Python AI Engine Service
  # ----------------------------------------
  - type: web
    name: reposage-ai-engine
    env: python
    plan: free
    buildCommand: "cd ai-engine && pip install -r requirements.txt"
    startCommand: "cd ai-engine && uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        sync: false
      - key: REPOSAGE_API_KEY
        sync: false
